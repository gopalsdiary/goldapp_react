<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Goldsmith</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #0095f6; --bg: #f0f2f5; --text: #1c1e21; --border: #dddfe2; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; margin-top: 10px; }
        button:disabled { opacity: 0.6; }
        .status { margin-top: 15px; font-size: 14px; display: none; padding: 10px; border-radius: 8px; }
        .error { background: #ffebe8; color: #f02849; display: block; }
        .success { background: #e7f3ff; color: var(--primary); display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>নতুন পাসওয়ার্ড</h1>
        <p style="color:#666; font-size:14px">আপনার একাউন্টের জন্য একটি নতুন শক্তিশালী পাসওয়ার্ড সেট করুন।</p>
        <form id="resetForm">
            <input type="password" id="newPassword" placeholder="নতুন পাসওয়ার্ড লিখুন" required minlength="6">
            <input type="password" id="confirmPassword" placeholder="পাসওয়ার্ডটি পুনরায় লিখুন" required minlength="6">
            <button type="submit" id="submitBtn">পাসওয়ার্ড পরিবর্তন করুন</button>
        </form>
        <div id="statusMsg" class="status"></div>
    </div>

    <script src="auth.js"></script>
    <script>
        const form = document.getElementById('resetForm');
        const statusMsg = document.getElementById('statusMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (pass !== confirm) {
                showMsg("পাসওয়ার্ড দুটি মেলেনি!", "error");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "অপেক্ষা করুন...";

            try {
                const { error } = await window.kbSupabaseClient.auth.updateUser({ password: pass });
                if (error) throw error;

                showMsg("পাসওয়ার্ড সফলভাবে পরিবর্তন করা হয়েছে! আপনাকে লগইন পেজে নিয়ে যাওয়া হচ্ছে...", "success");
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (err) {
                showMsg("ভুল হয়েছে: " + err.message, "error");
                submitBtn.disabled = false;
                submitBtn.textContent = "পাসওয়ার্ড পরিবর্তন করুন";
            }
        });

        function showMsg(text, type) {
            statusMsg.textContent = text;
            statusMsg.className = "status " + type;
        }
    </script>
</body>
</html>
