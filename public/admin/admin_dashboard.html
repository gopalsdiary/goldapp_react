<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Goldsmith</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #d1a457;
            --bg: #ffffff;
            --text: #1a1a1a;
            --loan-color: #f97316; /* Orange */
            --stock-color: #f97316; /* Orange */
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Top Actions (Login/Reset) */
        .top-nav {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 12px;
        }

        .nav-link {
            text-decoration: none;
            color: #666;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 12px;
            background: #f8f9fa;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transform: translateY(-2px);
        }

        .nav-link.logout { color: var(--danger); }
        .nav-link.reset { color: var(--warning); }

        .home-link {
            position: absolute;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: #aaa;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .home-link:hover { color: var(--text); }

        .dashboard-container {
            text-align: center;
            max-width: 700px;
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 45px;
            letter-spacing: -1.5px;
            color: #111;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .admin-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 35px 20px;
            border-radius: 28px;
            text-decoration: none;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .admin-btn:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 45px rgba(234, 88, 12, 0.2);
        }

        .admin-btn.loan {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: #fff;
        }
        
        .admin-btn.stock {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: #fff;
        }

        .icon-box {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            transition: 0.3s ease;
            color: #fff;
        }

        .admin-btn:hover .icon-box { 
            background: #fff; 
            color: #f97316; 
            transform: scale(1.1) rotate(5deg); 
        }

        .icon-box .material-icons {
            font-size: 32px;
        }

        .btn-label { font-weight: 750; font-size: 1.15rem; margin-bottom: 4px; }
        .btn-desc { font-size: 0.8rem; color: rgba(255, 255, 255, 0.8); }

        @media (max-width: 550px) {
            .top-nav { top: 20px; right: 20px; gap: 8px; flex-direction: column; }
            .btn-group { grid-template-columns: 1fr; }
            .admin-btn { padding: 30px; }
            h1 { font-size: 1.8rem; margin-top: 60px; }
        }
    </style>
</head>
<body>

    <a href="../index.html" class="home-link">
        <span class="material-icons">arrow_back</span> Portal
    </a>

    <div class="top-nav">
        <a href="#" onclick="openChangePasswordModal(); return false;" class="nav-link">
            <span class="material-icons">vpn_key</span>Change
        </a>
        <a href="#" onclick="resetPassword(); return false;" class="nav-link reset">
            <span class="material-icons">lock_reset</span> Reset
        </a>
        <a href="#" onclick="handleLogout(); return false;" class="nav-link logout">
            <span class="material-icons">logout</span> Logout
        </a>
    </div>

    <div class="dashboard-container">
        <h1>Admin Dashboard</h1>

        <div class="btn-group">
            <!-- Loan Button -->
            <a href="/loan" class="admin-btn loan">
                <div class="icon-box">
                    <span class="material-icons">payments</span>
                </div>
                <div class="btn-label">Loan</div>
                <div class="btn-desc">Customer loans & interest</div>
            </a>

            <!-- Stock Calculation Button -->
            <a href="/stock/stock_calculation.html" class="admin-btn stock">
                <div class="icon-box">
                    <span class="material-icons">calculate</span>
                </div>
                <div class="btn-label">স্টক হিসাব</div>
                <div class="btn-desc">Inventory & stock value</div>
            </a>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="changePassModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10000; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:32px; width:100%; max-width:420px; box-shadow:0 25px 70px rgba(0,0,0,0.3); position:relative; animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
            <button onclick="closeChangePasswordModal()" style="position:absolute; top:25px; right:25px; border:none; background:#f0f0f0; width:36px; height:36px; border-radius:50%; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;">✕</button>
            <h2 style="margin-bottom:10px; font-weight:800; letter-spacing:-1.5px; font-size:1.8rem;">পাসওয়ার্ড পরিবর্তন</h2>
            <p style="color:#666; font-size:0.9rem; margin-bottom:25px; font-weight:500;">নিরাপত্তার জন্য বর্তমান পাসওয়ার্ড দিন।</p>
            <form id="changePassForm">
                <div style="margin-bottom:18px">
                    <label style="display:block; font-size:12px; font-weight:800; color:#444; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;">বর্তমান পাসওয়ার্ড</label>
                    <input type="password" id="oldPass" placeholder="••••••••" style="width:100%; padding:14px; border:2px solid #eee; border-radius:16px; font-family:inherit; font-weight:600;" required>
                </div>
                <div style="margin-bottom:18px">
                    <label style="display:block; font-size:12px; font-weight:800; color:#444; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;">নতুন পাসওয়ার্ড</label>
                    <input type="password" id="newPass" placeholder="কমপক্ষে ৬ অক্ষরের" style="width:100%; padding:14px; border:2px solid #eee; border-radius:16px; font-family:inherit; font-weight:600;" required minlength="6">
                </div>
                <div style="margin-bottom:25px">
                    <label style="display:block; font-size:12px; font-weight:800; color:#444; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;">পাসওয়ার্ড নিশ্চিত করুন</label>
                    <input type="password" id="confirmPass" placeholder="আবার লিখুন" style="width:100%; padding:14px; border:2px solid #eee; border-radius:16px; font-family:inherit; font-weight:600;" required minlength="6">
                </div>
                <button type="submit" style="width:100%; padding:16px; background:linear-gradient(135deg, #f97316 0%, #ea580c 100%); color:white; border:none; border-radius:18px; font-weight:800; font-size:1.1rem; cursor:pointer; box-shadow:0 10px 25px rgba(234, 88, 12, 0.3);">পাসওয়ার্ড পরিবর্তন করুন</button>
            </form>
        </div>
    </div>
    <style>
        @keyframes modalPop { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>

    <!-- Auth Script -->
    <script src="auth.js"></script>
    <script>
        const token = localStorage.getItem('supabase_access_token');
        if (!token) window.location.href = 'login.html';

        // Loading helpers
        function show() { document.body.style.opacity = '0.5'; document.body.style.pointerEvents = 'none'; }
        function hide() { document.body.style.opacity = '1'; document.body.style.pointerEvents = 'auto'; }

        function handleLogout() {
            if (confirm("Are you sure you want to logout?")) {
                localStorage.removeItem('supabase_access_token');
                localStorage.removeItem('supabase_session');
                localStorage.removeItem('supabase_user');
                window.location.href = 'login.html';
            }
        }

        function openChangePasswordModal() { document.getElementById('changePassModal').style.display = 'flex'; }
        function closeChangePasswordModal() { document.getElementById('changePassModal').style.display = 'none'; }

        document.getElementById('changePassForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPass = document.getElementById('oldPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            
            if (newPass !== confirmPass) { alert("নতুন পাসওয়ার্ড দুটি মেলেনি!"); return; }

            const userStr = localStorage.getItem('supabase_user');
            if (!userStr) { alert("সেশন পাওয়া যায়নি। লগইন করুন।"); return; }
            const email = JSON.parse(userStr).email;

            try {
                show();
                // 1. Verify old password via temporary sign-in
                const { error: signInError } = await window.kbSupabaseClient.auth.signInWithPassword({ email, password: oldPass });
                if (signInError) throw new Error("বর্তমান পাসওয়ার্ডটি ভুল ছিল!");

                // 2. Update to new password
                const { error: updateError } = await window.kbSupabaseClient.auth.updateUser({ password: newPass });
                if (updateError) throw updateError;

                alert("পাসওয়ার্ড সফলভাবে পরিবর্তন করা হয়েছে!");
                closeChangePasswordModal();
            } catch (err) {
                alert(err.message || "পাসওয়ার্ড পরিবর্তন করা যায়নি।");
            } finally {
                hide();
            }
        });

        async function resetPassword() {
            const userStr = localStorage.getItem('supabase_user');
            let email = '';
            
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    email = user.email || (typeof user === 'string' ? user : '');
                } catch (e) {}
            }

            if (!email || email.indexOf('@') === -1) {
                alert("আপনার একাউন্টের সাথে কোনো বৈধ ইমেইল পাওয়া যায়নি। দয়া করে এডমিনের সাথে যোগাযোগ করুন।");
                return;
            }

            if (confirm("আপনি কি " + email + " ঠিকানায় পাসওয়ার্ড রিসেট করার মেসেজ পাঠাতে চান?")) {
                if (!window.kbSupabaseClient) {
                    alert("Supabase কানেকশন পাওয়া যায়নি। কিছুক্ষণ পর আবার চেষ্টা করুন।");
                    return;
                }

                try {
                    show(); // Show loading indicator if available
                    const { data, error } = await window.kbSupabaseClient.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/admin/reset-password.html',
                    });

                    if (error) throw error;
                    alert("পাসওয়ার্ড রিসেট রিকোয়েস্টটি সফলভাবে " + email + " ঠিকানায় পাঠানো হয়েছে। দয়া করে আপনার ইনবক্স (এবং স্প্যাম ফোল্ডার) চেক করুন।");
                } catch (err) {
                    console.error('Reset error:', err);
                    alert("ভুল হয়েছে: " + (err.message || "রিসেট রিকোয়েস্ট পাঠানো যায়নি।"));
                } finally {
                    hide();
                }
            }
        }
    </script>
</body>
</html>
